<html>
        <head><title>Downloaded HTML</title></head>
        <body>
            <pre style="white-space: pre-wrap; word-wrap: break-word;"><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMO AI</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{'display':'standalone','orientation':'portrait'}">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #00f3ff;
            cursor: pointer;
        }

        #start-screen {
            text-align: center;
            z-index: 10;
        }

        #start-screen h1 {
            font-size: 2rem;
            text-shadow: 0 0 10px #00f3ff;
            animation: pulse 2s infinite;
        }

        #bmo-face {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 60px;
        }

        .eyes-container {
            display: flex;
            gap: 120px;
        }

        .eye {
            width: 50px;
            height: 70px;
            background-color: transparent;
            border: 6px solid #00f3ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #00f3ff;
            transition: all 0.3s ease;
            animation: blink 5s infinite;
        }

        .mouth {
            width: 140px;
            height: 15px;
            background-color: transparent;
            border: 6px solid #00f3ff;
            border-radius: 20px;
            box-shadow: 0 0 15px #00f3ff;
            transition: height 0.1s, border-radius 0.1s;
        }

        /* Classes for expressions */
        .talking { animation: talk 0.25s infinite alternate; }
        .listening { box-shadow: 0 0 30px #00f3ff, inset 0 0 10px #00f3ff !important; border-color: #ffffff !important; }

        @keyframes blink {
            0%, 96%, 98%, 100% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); }
        }

        @keyframes talk {
            0% { height: 15px; width: 140px; }
            100% { height: 50px; width: 150px; border-radius: 50%; }
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>WAKE BMO</h1>
        <p>(Tap anywhere to start)</p>
    </div>

    <div id="bmo-face">
        <div class="eyes-container">
            <div class="eye" id="left-eye"></div>
            <div class="eye" id="right-eye"></div>
        </div>
        <div class="mouth" id="mouth"></div>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const bmoFace = document.getElementById('bmo-face');
        const mouth = document.getElementById('mouth');
        const eyes = document.querySelectorAll('.eye');

        // Speech setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("This browser doesn't support BMO's ears! Please use Chrome or Edge.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.continuous = false; // We manually restart to keep it snappy
        recognition.interimResults = false;

        // Wake BMO logic
        document.body.addEventListener('click', () => {
            if (startScreen.style.display !== 'none') {
                // Request fullscreen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
                
                startScreen.style.display = 'none';
                bmoFace.style.display = 'flex';
                
                speak("BMO is awake and ready to play!");
            }
        });

        // Recognition events
        recognition.onstart = () => {
            eyes.forEach(e => e.classList.add('listening'));
            console.log("Listening...");
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            console.log("User said:", transcript);
            generateBMOAnswer(transcript);
        };

        recognition.onend = () => {
            eyes.forEach(e => e.classList.remove('listening'));
            // Restart listening if BMO isn't currently speaking
            if (!window.speechSynthesis.speaking) {
                recognition.start();
            }
        };

        recognition.onerror = (event) => {
            if (event.error !== 'no-speech') {
                console.error("Mic error:", event.error);
            }
            // Auto-restart on silence/error
            setTimeout(() => { try { recognition.start(); } catch(e){} }, 500);
        };

        // BMO's Personality/Brain
        async function generateBMOAnswer(userInput) {
    console.log("Sending to BMO brain:", userInput);
    const eyes = document.querySelectorAll('.eye');
    
    // Turn eyes white to show BMO is "Thinking"
    eyes.forEach(e => e.style.borderColor = "#ffffff");

    try {
        const response = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: userInput }),
        });

        if (!response.ok) {
            throw new Error("Brain not responding. Status: " + response.status);
        }

        const data = await response.json();
        eyes.forEach(e => e.style.borderColor = "#00f3ff");

        if (data.reply) {
            bmoSpeak(data.reply);
        } else {
            bmoSpeak("My brain is empty! Check the OpenAI API key.");
        }

    } catch (error) {
        console.error("BMO Error:", error);
        // BMO will now TELL you if there is a connection error
        bmoSpeak("Oh no! I lost my connection to the cloud.");
        eyes.forEach(e => e.style.borderColor = "#ff0000");
    }
}

        // Voice and Face Animation
        function speak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Customize BMO's voice
            utterance.pitch = 1.3; // High pitch like BMO
            utterance.rate = 1.0;
            
            utterance.onstart = () => {
                mouth.classList.add('talking');
            };

            utterance.onend = () => {
                mouth.classList.remove('talking');
                // Give a small delay before listening again to avoid hearing self
                setTimeout(() => { recognition.start(); }, 400);
            };

            synth.speak(utterance);
        }
    </script>
</body>
</html>
